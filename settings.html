<!DOCTYPE html>
<html>
<head>
    <title>Settings - SmartHire Enterprise</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard-layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>SmartHire</h2>

        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="jobs.html">Jobs</a></li>
            <li><a href="candidates.html">Candidates</a></li>
            <li><a href="interviews.html">Interviews</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="settings.html" class="active">Settings</a></li>
            <li><a href="index.html">Logout</a></li>
        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <div class="topbar">
            <h2>Admin Panel - Settings</h2>
        </div>

        <!-- PROFILE SETTINGS -->
        <div class="report-card">
            <h3>Profile Settings</h3>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" value="Admin User">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" value="admin@smarthire.com">
            </div>

            <div class="form-group">
                <label>Role</label>
                <select>
                    <option>Administrator</option>
                    <option>HR Manager</option>
                    <option>Recruiter</option>
                </select>
            </div>

            <button class="save-btn">Save Changes</button>
        </div>

        <br>

        <!-- COMPANY SETTINGS -->
        <div class="report-card">
            <h3>Company Settings</h3>

            <div class="form-group">
                <label>Company Name</label>
                <input type="text" value="SmartHire Inc.">
            </div>

            <div class="form-group">
                <label>Company Email</label>
                <input type="email" value="hr@smarthire.com">
            </div>

            <button class="save-btn">Save Changes</button>
        </div>

        <br>

        <!-- NOTIFICATION SETTINGS -->
        <div class="report-card">
            <h3>Notification Preferences</h3>

            <div class="form-group">
                <label>Email Notifications</label>
                <select>
                    <option>Enabled</option>
                    <option>Disabled</option>
                </select>
            </div>

            <div class="form-group">
                <label>Interview Reminders</label>
                <select>
                    <option>Enabled</option>
                    <option>Disabled</option>
                </select>
            </div>

            <button class="save-btn">Save Changes</button>
        </div>

        <br>

        <!-- SYSTEM SETTINGS -->
        <div class="report-card">
            <h3>System Preferences</h3>

            <div class="form-group">
                <label>Default Language</label>
                <select>
                    <option>English</option>
                    <option>Spanish</option>
                </select>
            </div>

            <div class="form-group">
                <label>Timezone</label>
                <select>
                    <option>GMT +5:30</option>
                    <option>GMT +0</option>
                </select>
            </div>

            <button class="save-btn">Save Changes</button>
        </div>

    </div>

</div>

</body>
</html>
